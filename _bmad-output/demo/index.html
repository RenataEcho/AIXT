<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小提大作（融合升级版）· 产品迭代 Demo</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <link rel="stylesheet" href="https://unpkg.com/element-plus/theme-chalk/dark/css-vars.css" />
  <style>
    :root {
      --el-color-primary: #7b6cf6;
      --el-color-primary-light-3: #9186f8;
      --el-color-primary-light-5: #b3abfb;
      --el-color-primary-light-7: #d5d0fd;
      --el-color-primary-light-8: #e6e3fe;
      --el-color-primary-light-9: #f2f0ff;
      --brand-grad: linear-gradient(135deg, #7b6cf6 0%, #b78bff 100%);
      --rail-w: 208px;
      --content-gap: 16px;
      --content-px: 20px;
      --content-py: 40px;
      --page-shell-max: 1520px;
      --page-shell-max-wide: 1680px;
      --page-shell-gutter: 12px;
      --nav-font-size: 14px;
      --nav-icon-size: 17px;
      --nav-item-py: 9px;
      --nav-item-px: 12px;
      --nav-item-gap: 11px;
      --nav-item-space: 6px;
    }
    html.dark {
      --el-bg-color: #16171d;
      --el-bg-color-page: #0a0b0e;
      --el-bg-color-overlay: #1b1c23;
      --el-fill-color-blank: #0a0b0e;
      --el-fill-color-light: #1b1c23;
      --el-fill-color: #22232b;
      --el-border-color: #2a2c36;
      --el-border-color-light: #23252e;
      --el-border-color-lighter: #1e2028;
      --el-text-color-primary: #e8e9ef;
      --el-text-color-regular: #c2c4cf;
      --el-text-color-secondary: #8a8d9a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--el-bg-color-page); }
    #app { height: 100vh; }
    body { font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif; color: var(--el-text-color-primary); }

    /* ===== 左侧栏（左图标 + 右功能名称） ===== */
    .rail {
      position: fixed; left: 0; top: 0; bottom: 0; width: var(--rail-w); background: #101116;
      border-right: 1px solid var(--el-border-color-lighter); display: flex; flex-direction: column;
      align-items: stretch; padding: 16px 12px 14px; z-index: 30; overflow: hidden;
    }
    .rail-head { flex-shrink: 0; }
    .rail-main {
      flex: 1; min-height: 0; display: flex; flex-direction: column; justify-content: center;
      gap: 0; overflow-y: auto; padding: 8px 0;
    }
    .rail-main::-webkit-scrollbar { width: 0; }
    .rail-footer {
      flex-shrink: 0; display: flex; flex-direction: column; gap: 6px;
      padding-top: 12px; margin-top: 8px; border-top: 1px solid var(--el-border-color-lighter);
    }
    .rail .mark {
      width: 40px; height: 40px; border-radius: 11px; overflow: hidden;
      display:flex; align-items:center; justify-content:center;
      margin: 0 auto 12px; flex-shrink: 0;
    }
    .rail .mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .rail .grp { height: 1px; background: var(--el-border-color); margin: 14px 6px; flex-shrink: 0; }
    .nav-item {
      position: relative; width: 100%; padding: var(--nav-item-py) var(--nav-item-px); border-radius: 10px; margin-bottom: var(--nav-item-space);
      display: flex; flex-direction: row; align-items: center; gap: var(--nav-item-gap); cursor: pointer;
      color: var(--el-text-color-secondary); transition: .18s; flex-shrink: 0;
      min-height: 40px; font-weight: 760; line-height: 1.2;
    }
    .nav-item .ic { font-size: var(--nav-icon-size); line-height: 1; display: flex; align-items: center; flex-shrink: 0; }
    .nav-item .ic .el-icon { font-size: var(--nav-icon-size); }
    .nav-item .tx { font-size: var(--nav-font-size); line-height: 1.2; font-weight: 760; letter-spacing: 0; flex: 1; min-width: 0; }
    .nav-item:hover { background: rgba(255,255,255,.05); color: var(--el-text-color-regular); }
    .nav-item.on { background: rgba(123,108,246,.16); color: #b9aefb; }
    .nav-item.on::before { content:''; position:absolute; left:0; top:10px; bottom:10px; width:3px; border-radius:3px; background: var(--brand-grad); }
    .nav-item .dot { margin-left:auto; flex-shrink: 0; font-size: 10px; padding: 3px 7px; border-radius: 999px; line-height: 1.1; font-weight: 520; white-space: nowrap; }
    .rail-footer-item {
      position: relative; width: 100%; padding: 8px 12px; border-radius: 10px;
      display: flex; flex-direction: row; align-items: center; gap: var(--nav-item-gap); cursor: pointer;
      color: var(--el-text-color-secondary); transition: .18s; flex-shrink: 0;
      min-height: 38px; font-weight: 760; line-height: 1.2; border: none; background: transparent;
      font: inherit; text-align: left;
    }
    .rail-footer-item .ic { font-size: var(--nav-icon-size); line-height: 1; display: flex; align-items: center; flex-shrink: 0; }
    .rail-footer-item .ic .el-icon { font-size: var(--nav-icon-size); }
    .rail-footer-item .tx { font-size: var(--nav-font-size); line-height: 1.2; font-weight: 760; flex: 1; min-width: 0; }
    .rail-footer-item:hover { background: rgba(255,255,255,.05); color: var(--el-text-color-regular); }
    .rail-footer-item.on { background: rgba(123,108,246,.16); color: #b9aefb; }
    .rail-footer-item.on::before { content:''; position:absolute; left:0; top:8px; bottom:8px; width:3px; border-radius:3px; background: var(--brand-grad); }
    .rail-footer-pop { position: relative; }
    .rail-footer-pop .coin-badge {
      position:absolute; top:-6px; right:6px; padding:2px 7px; border-radius:999px; font-size:10px; font-weight:700; line-height:1.45;
      color:#fff; background:linear-gradient(135deg,#ff6b4a,#ff8f6b); border:1px solid rgba(255,255,255,.16); white-space:nowrap; pointer-events:none;
    }
    .rail-footer-profile {
      justify-content: center; padding: 10px 12px 4px; min-height: auto;
    }
    .rail-footer-profile.on::before { top: 6px; bottom: 6px; }
    .rail-footer-avatar { cursor: pointer; transition: transform .18s, box-shadow .18s; }
    .rail-footer-avatar:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(123,108,246,.28); }
    .dot.new { background: var(--brand-grad); color:#fff; }
    .dot.pro { background:#ff9f43; color:#fff; }
    .dot.earn { background: linear-gradient(135deg, #f5b942, #e8a030); color: #141414; font-weight: 700; }

    /* ===== 按钮：对齐小提大作，白底黑字，去蓝/紫 ===== */
    .el-button--primary {
      --el-button-bg-color:#ffffff; --el-button-border-color:#ffffff; --el-button-text-color:#141414;
      --el-button-hover-bg-color:#ececf1; --el-button-hover-border-color:#ececf1; --el-button-hover-text-color:#000;
      --el-button-active-bg-color:#d9d9de; --el-button-active-border-color:#d9d9de; --el-button-active-text-color:#000;
      --el-button-disabled-bg-color:#3a3b44; --el-button-disabled-border-color:#3a3b44; --el-button-disabled-text-color:#8a8d9a;
    }
    .el-button.is-link { --el-button-text-color:#e8e9ef; }
    .el-radio-button.is-active .el-radio-button__inner,
    .el-radio-button__original-radio:checked + .el-radio-button__inner {
      background:#ffffff !important; border-color:#ffffff !important; color:#141414 !important; box-shadow:-1px 0 0 0 #ffffff !important;
    }

    /* ===== 主舞台 ===== */
    .stage {
      margin-left: var(--rail-w);
      height: 100vh;
      overflow-y: auto;
      position: relative;
      min-width: 0;
      padding-left: var(--content-gap);
      padding-right: var(--content-gap);
    }

    /* ===== 教程中心（复刻 aixtdz /doc） ===== */
    .doc-shell { width:min(1180px,100%); margin:0 auto; padding:0 8px 24px; box-sizing:border-box; }
    .doc-layout { display:grid; grid-template-columns:220px minmax(0,1fr); gap:18px; align-items:start; }
    .doc-leftbar { position:sticky; top:12px; border:1px solid var(--el-border-color-lighter); border-radius:16px; background:var(--el-bg-color); overflow:hidden; }
    .doc-leftbar__head { padding:14px 16px 10px; border-bottom:1px solid var(--el-border-color-lighter); font-size:13px; font-weight:800; }
    .doc-leftbar__nav { display:grid; gap:4px; padding:10px; }
    .doc-nav-item {
      display:flex; align-items:center; gap:8px; width:100%; padding:10px 12px; border:none; border-radius:12px;
      background:transparent; color:var(--el-text-color-secondary); font:inherit; font-size:13px; text-align:left; cursor:pointer; transition:.18s;
    }
    .doc-nav-item.on, .doc-nav-item:hover { background:rgba(245,185,66,.1); color:var(--el-text-color-primary); }
    .doc-nav-item.on { box-shadow:inset 0 0 0 1px rgba(245,185,66,.22); }
    .doc-main { border:1px solid var(--el-border-color-lighter); border-radius:16px; background:var(--el-bg-color); padding:22px 24px 28px; min-width:0; }
    .doc-hero { margin-bottom:18px; }
    .doc-hero h2 { margin:0 0 8px; font-size:28px; font-weight:900; letter-spacing:-.02em; }
    .doc-hero p { margin:0; font-size:14px; line-height:1.75; color:var(--el-text-color-secondary); max-width:720px; }
    .doc-section { margin-top:18px; }
    .doc-section h3 { margin:0 0 10px; font-size:18px; font-weight:800; }
    .doc-section p, .doc-section li { font-size:14px; line-height:1.75; color:var(--el-text-color-regular); }
    .doc-section ul { margin:0; padding-left:18px; }
    .doc-steps { display:grid; gap:10px; margin-top:12px; }
    .doc-step { display:grid; grid-template-columns:34px minmax(0,1fr); gap:12px; padding:12px 14px; border-radius:12px; background:var(--el-fill-color-light); border:1px solid var(--el-border-color-lighter); }
    .doc-step__index { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:800; color:#f5d782; background:rgba(245,185,66,.12); }
    .doc-step strong { display:block; font-size:14px; margin-bottom:4px; }
    .doc-step span { font-size:13px; color:var(--el-text-color-secondary); line-height:1.6; }
    @media (max-width: 900px) {
      .doc-layout { grid-template-columns:1fr; }
      .doc-leftbar { position:static; }
      .doc-leftbar__nav { grid-template-columns:repeat(2, minmax(0,1fr)); }
    }

    /* ===== 联系我们（复刻 aixtdz 商务合作弹窗） ===== */
    .bc-dialog-title-wrap { display:flex; align-items:center; gap:10px; }
    .bc-dialog-title { margin:0; font-size:18px; font-weight:800; }
    .bc-field { margin-bottom:16px; }
    .bc-label { font-size:13px; font-weight:700; margin-bottom:8px; color:var(--el-text-color-primary); }
    .bc-option-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .bc-option-grid--two { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:8px; }
    .bc-option-btn {
      min-height:36px; padding:0 12px; border-radius:10px; border:1px solid var(--el-border-color-lighter);
      background:var(--el-fill-color-light); color:var(--el-text-color-regular); font:inherit; font-size:13px; cursor:pointer; transition:.18s;
    }
    .bc-option-btn.is-active { border-color:rgba(245,185,66,.45); background:rgba(245,185,66,.12); color:#f5d782; font-weight:700; }
    .bc-contact-row { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:10px; }
    .bc-success { text-align:center; padding:8px 0 4px; }
    .bc-success-title { margin:0 0 8px; font-size:18px; font-weight:800; }
    .bc-success-desc { margin:0 0 18px; font-size:13px; color:var(--el-text-color-secondary); line-height:1.7; }
    .bc-qr-image { width:220px; height:220px; object-fit:cover; border-radius:14px; border:1px solid var(--el-border-color-lighter); background:#fff; }
    .bc-qr-empty { margin:0; font-size:13px; color:var(--el-text-color-secondary); }
    @media (max-width: 640px) {
      .bc-contact-row, .bc-option-grid--two { grid-template-columns:1fr; }
    }
    .content { padding: 12px var(--content-px) var(--content-py); min-width: 0; max-width: 100%; }

    /* ===== 全局页面壳：居中 · 向两侧对称扩展 ===== */
    .page-shell {
      width: min(var(--page-shell-max), 100%);
      max-width: var(--page-shell-max);
      margin: 0 auto;
      padding: 0 var(--page-shell-gutter);
      box-sizing: border-box;
    }
    .page-shell--wide { --page-shell-max: var(--page-shell-max-wide); }
    .page-shell .page-title {
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .page-shell .page-tabs .el-tabs__header { margin-bottom: 18px; }
    .page-shell .page-tabs .el-tabs__nav-wrap,
    .page-shell .page-tabs .el-tabs__nav-scroll { display: flex; justify-content: flex-start; }
    .page-shell .page-tabs .el-tabs__nav { float: none; }
    .page-shell .popcorn-tabs,
    .page-shell .user-space-tabs,
    .page-shell .prompt-primary-tabs,
    .page-shell .prompt-cat-tabs,
    .page-shell .prompt-tag-chips,
    .page-shell .cp-title-tabs { justify-content: flex-start; }
    .page-shell .stat-cards .stat-card { text-align: center; }
    .page-shell .card h3 { justify-content: flex-start; }
    .page-shell .sec-head { justify-content: center; flex-wrap: wrap; }
    .page-shell .sec-head .all-link { margin-left: 0; }
    .page-shell .fusion-hint { text-align: center; }
    .page-shell.proj-page .proj-sec-head,
    .page-shell.proj-page .insp-sec-head { justify-content: flex-start; }
    .page-shell.proj-page .proj-all-link { margin-left: auto; }
    .page-shell.prompt-page .prompt-page-head { justify-content: space-between; }
    .page-shell.prompt-page .prompt-head-actions { justify-content: flex-end; }
    .page-shell.prompt-page .prompt-tag-row { justify-content: space-between; }
    .page-shell.prompt-page .prompt-stream-head { text-align: left; }
    .page-shell.user-space-shell .user-space-topline { text-align: left; grid-template-columns: minmax(0,1fr) auto; justify-items: start; }
    .page-shell.user-space-shell .user-space-tabs { justify-content: flex-start; flex-wrap: nowrap; }
    @media (max-width: 640px) {
      .page-shell { padding: 0 8px; --page-shell-gutter: 8px; }
    }

    /* ===== 首页 hero ===== */
    .hero-wrap { margin: 6px 0 26px; }
    .slide { height: 100%; border-radius: 16px; overflow: hidden; position: relative; display:flex; align-items:center; padding: 0 40px; }
    .slide .s-title { font-size: 30px; font-weight: 800; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.4); }
    .slide .s-sub { font-size: 15px; color: rgba(255,255,255,.92); margin: 8px 0 16px; text-shadow:0 2px 8px rgba(0,0,0,.4); }
    .sec-head { display:flex; align-items:center; gap:16px; margin: 4px 0 16px; }
    .sec-head h2 { margin:0; font-size:19px; }
    .home-tab { font-size:14px; color: var(--el-text-color-secondary); cursor:pointer; padding:3px 4px; }
    .home-tab.on { color: var(--el-text-color-primary); font-weight:700; border-bottom:2px solid var(--el-color-primary); }
    .all-link { margin-left:auto; font-size:13px; color: var(--el-text-color-secondary); cursor:pointer; }
    .proj-row { display:grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 140px), 1fr)); gap: 16px; }
    .pcard { border-radius: 12px; overflow:hidden; cursor:pointer; transition:.2s; border:1px solid var(--el-border-color-lighter); background: var(--el-bg-color); }
    .pcard:hover { transform: translateY(-3px); border-color: var(--el-border-color); }
    .pcard .pc-thumb { height: 118px; position:relative; display:flex; align-items:center; justify-content:center; }
    .pcard .pc-thumb .wm { font-size: 15px; font-weight:800; color: rgba(255,255,255,.06); letter-spacing: 3px; }
    .pcard.create .pc-thumb { border:1px dashed var(--el-border-color); border-radius:12px; flex-direction:column; gap:6px; color: var(--el-text-color-secondary); background: var(--el-fill-color-light); }
    .pcard .pc-meta { padding: 9px 11px; }
    .pcard .pc-meta .n { font-size: 13px; font-weight:600; }
    .pcard .pc-meta .d { font-size: 11px; color: var(--el-text-color-secondary); margin-top:3px; }

    /* 通用 */
    .page-title { display:flex; align-items:center; justify-content:space-between; margin: 6px 0 16px; }
    .page-title h2 { margin:0; font-size:20px; }
    .page-title .desc { font-size:13px; color: var(--el-text-color-secondary); margin-top:4px; }
    .stat-cards { display:grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 180px), 1fr)); gap:16px; margin-bottom:20px; }
    .stat-card { background: var(--el-bg-color); border:1px solid var(--el-border-color-lighter); border-radius:12px; padding:18px; }
    .stat-card .v { font-size:26px; font-weight:700; margin-top:6px; }
    .stat-card .l { font-size:13px; color: var(--el-text-color-secondary); }
    .stat-card .t { font-size:12px; margin-top:6px; }
    .card { background: var(--el-bg-color); border:1px solid var(--el-border-color-lighter); border-radius:12px; padding:18px; margin-bottom:16px; }
    .card h3 { margin:0 0 14px; font-size:15px; display:flex; align-items:center; gap:8px; }
    .grid-2 { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:16px; }
    .grid-3 { display:grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr)); gap:16px; }
    .grid-4 { display:grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 200px), 1fr)); gap:16px; }
    .badge-new { background: var(--brand-grad); color:#fff; font-size:10px; padding:1px 7px; border-radius:8px; margin-left:8px; vertical-align:middle; }
    .badge-pro { background:#ff9f43; color:#fff; font-size:10px; padding:1px 7px; border-radius:8px; margin-left:8px; vertical-align:middle; }
    .fusion-hint { font-size:12px; color:#b9aefb; background: rgba(123,108,246,.12); border:1px solid rgba(123,108,246,.3); padding:8px 12px; border-radius:8px; margin-bottom:14px; }
    .quick { display:flex; gap:12px; flex-wrap:wrap; }
    .quick .q { flex:1; min-width:150px; border:1px solid var(--el-border-color-lighter); border-radius:12px; padding:16px; cursor:pointer; transition:.2s; background: var(--el-bg-color); }
    .quick .q:hover { border-color: var(--el-color-primary); transform: translateY(-2px); }
    .quick .q .qi { font-size:22px; } .quick .q .qt { font-weight:600; margin:8px 0 4px; } .quick .q .qd { font-size:12px; color: var(--el-text-color-secondary); }
    .thumb { background: var(--brand-grad); opacity:.82; }
    /* writing */
    .writer { display:grid; grid-template-columns: 220px 1fr 260px; height: calc(100vh - 200px); border:1px solid var(--el-border-color-lighter); border-radius:12px; overflow:hidden; }
    .writer .col { overflow-y:auto; }
    .writer .chapters { border-right:1px solid var(--el-border-color-lighter); background: var(--el-fill-color-light); }
    .writer .chapters .ch { padding:10px 14px; font-size:13px; cursor:pointer; border-left:3px solid transparent; color: var(--el-text-color-regular); }
    .writer .chapters .ch.active { background: rgba(123,108,246,.14); border-left-color: var(--el-color-primary); color:#b9aefb; }
    .writer .editor { padding:20px 26px; }
    .writer .editor textarea { width:100%; min-height:420px; border:none; outline:none; resize:none; background:transparent; font-size:15px; line-height:1.9; color: var(--el-text-color-primary); font-family:inherit; }
    .writer .ai { border-left:1px solid var(--el-border-color-lighter); padding:16px; background: var(--el-fill-color-light); }
    .writing-placeholder { border:1px solid var(--el-border-color-lighter); border-radius:12px; padding:48px 40px; min-height:calc(100vh - 200px); background:var(--el-fill-color-light); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
    .writing-placeholder__main { font-size:18px; font-weight:600; color:var(--el-text-color-primary); margin-bottom:32px; line-height:1.6; }
    .writing-placeholder__opts { max-width:640px; width:100%; display:flex; flex-direction:column; gap:16px; text-align:left; }
    .writing-placeholder__item { display:flex; gap:14px; align-items:flex-start; padding:18px 20px; border-radius:10px; background:var(--el-bg-color); border:1px solid var(--el-border-color-lighter); }
    .writing-placeholder__tag { flex-shrink:0; width:28px; height:28px; border-radius:8px; background:var(--brand-grad); color:#fff; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; }
    .writing-placeholder__item strong { display:block; font-size:14px; margin-bottom:6px; color:var(--el-text-color-primary); }
    .writing-placeholder__item p { margin:0; font-size:13px; line-height:1.75; color:var(--el-text-color-secondary); }
    .writing-placeholder--script { align-items:stretch; justify-content:flex-start; text-align:left; padding:32px 36px; overflow-y:auto; }
    .writing-placeholder__section { max-width:820px; width:100%; margin:0 auto; }
    .writing-placeholder__section + .writing-placeholder__section { margin-top:28px; padding-top:24px; border-top:1px solid var(--el-border-color-lighter); }
    .writing-placeholder__section-title { font-size:15px; font-weight:600; color:var(--el-text-color-primary); margin-bottom:14px; }
    .writing-placeholder__list { margin:0; padding-left:22px; font-size:13px; line-height:1.85; color:var(--el-text-color-secondary); }
    .writing-placeholder__list li + li { margin-top:10px; }
    .writing-placeholder__list a { color:var(--el-color-primary); text-decoration:none; }

    /* ===== 项目页 · 复刻小题大作创作页 ===== */

    /* 3D Banner 轮播 */

    /* 最近项目 */

    /* 影片 · 画布宫格（对齐 aixtdz 画布 tab） */

      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 172px), 1fr));

    }

    }
    .canvas-card:hover { transform: translateY(-2px); border-color: #333; }

      border: 1px dashed #333; background: #111; display: flex; align-items: center; justify-content: center;
    }
    .canvas-card.create .cg-inner {
      display: flex; flex-direction: column; align-items: center; gap: 8px; color: #888; padding: 12px;
    }

      margin-top: 4px; height: 26px; padding: 0 12px; border-radius: 13px;

    /* 工具 · 宫格（一行最多 5 个，卡片加大） */
    .tools-page .canvas-grid {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 28px;
    }

      background: #141414; border: 1px solid #222; min-width: 0;
    }

    }

    .tool-card .tool-num {

    }
    @media (max-width: 760px) {

    .sb-center {
      width: min(420px, 34vw); flex-shrink: 0; border-right: 1px solid var(--el-border-color-lighter);
      display: flex; flex-direction: column; min-height: 0; min-width: 280px;
    }
    .sb-video-wrap { padding: 12px; border-bottom: 1px solid var(--el-border-color-lighter); }
    .sb-video {
      position: relative; border-radius: 8px; overflow: hidden; background: #050608;
      aspect-ratio: 16/10; border: 1px solid var(--el-border-color-lighter);
    }
    .sb-video img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sb-video-overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end;
      background: linear-gradient(transparent 40%, rgba(0,0,0,.72));
    }
    .sb-video-title {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 13px; font-weight: 800; letter-spacing: 2px; color: rgba(255,255,255,.88);
      text-align: center; text-shadow: 0 2px 12px rgba(0,0,0,.6); pointer-events: none;
    }
    .sb-video-controls {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
    }
    .sb-play-btn {
      width: 28px; height: 28px; border-radius: 50%; border: none; background: rgba(255,255,255,.92);
      color: #141414; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .sb-time { font-size: 10px; color: rgba(255,255,255,.82); white-space: nowrap; }
    .sb-progress {
      flex: 1; height: 4px; border-radius: 999px; background: rgba(255,255,255,.18); overflow: hidden; min-width: 40px;
    }
    .sb-progress span { display: block; height: 100%; background: var(--el-color-primary); width: var(--pct, 0%); }
    .sb-summary { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 12px; gap: 8px; overflow: hidden; }
    .sb-summary-head { font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .sb-summary-body {
      flex: 1; overflow: auto; font-size: 12px; line-height: 1.75; color: var(--el-text-color-regular);
      border: 1px solid var(--el-border-color-lighter); border-radius: 8px; padding: 10px 12px;
      background: var(--el-fill-color-light); white-space: pre-wrap;
    }
    .sb-script { flex: 1; min-width: 0; display: flex; flex-direction: column; min-height: 0; }
    .sb-script-head {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 10px 14px; border-bottom: 1px solid var(--el-border-color-lighter);
      background: var(--el-fill-color-light); flex-wrap: wrap;
    }
    .sb-script-head label { font-size: 12px; color: var(--el-text-color-secondary); margin-right: 6px; }
    .sb-scene-list { flex: 1; overflow: auto; padding: 12px 14px; display: grid; gap: 16px; align-content: start; }
    .sb-scene {
      border: 1px solid var(--el-border-color-lighter); border-radius: 10px;
      background: var(--el-fill-color-light); overflow: hidden;
    }
    .sb-scene-head {
      display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap;
      padding: 10px 12px; border-bottom: 1px dashed var(--el-border-color-lighter);
      background: rgba(0,0,0,.08);
    }
    .sb-scene-tag {
      font-size: 11px; font-weight: 700; color: #fff; background: #5b4db8;
      border-radius: 6px; padding: 4px 10px; flex-shrink: 0;
    }
    .sb-scene-setting { font-size: 12px; font-weight: 600; color: var(--el-text-color-primary); align-self: center; }
    .sb-scene-meta {
      width: 100%; display: grid; gap: 4px; font-size: 11px; color: var(--el-text-color-secondary); padding-left: 2px;
    }
    .sb-scene-meta b { color: var(--el-text-color-regular); font-weight: 600; margin-right: 4px; }
    .sb-scene-body { padding: 10px 12px 12px; display: grid; gap: 8px; }
    .sb-line { font-size: 12px; line-height: 1.65; color: var(--el-text-color-regular); }
    .sb-line-action .sb-ts { color: var(--el-text-color-secondary); margin-right: 6px; font-variant-numeric: tabular-nums; }
    .sb-line-dialogue .sb-speaker { color: #5b9cf5; font-weight: 600; margin-right: 4px; }
    .sb-line-dialogue .sb-ts { color: var(--el-text-color-secondary); margin: 0 4px; font-variant-numeric: tabular-nums; }
    @media (max-width: 1100px) {
      .sb-body { flex-direction: column; }
      .sb-episodes { width: 100%; max-height: 220px; border-right: none; border-bottom: 1px solid var(--el-border-color-lighter); }
      .sb-ep-list { max-height: 160px; }
      .sb-center { width: 100%; max-width: none; border-right: none; border-bottom: 1px solid var(--el-border-color-lighter); }
      .sb-summary { max-height: 200px; }
    }

    /* ===== 页面需求说明（一级菜单 · 可拖动抽屉） ===== */
    .page-req-trigger {
      position: fixed;
      top: 18px;
      right: 24px;
      z-index: 100;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(250, 173, 20, .45);
      background: rgba(250, 173, 20, .12);
      color: #f5d782;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: .18s;
      box-shadow: 0 4px 18px rgba(0, 0, 0, .28);
      white-space: nowrap;
    }
    .page-req-trigger:hover {
      background: rgba(250, 173, 20, .22);
      border-color: rgba(250, 173, 20, .65);
      color: #ffe9a8;
    }
    .page-req-drawer {
      position: fixed;
      z-index: 10001;
      width: min(540px, calc(100vw - 32px));
      height: min(640px, calc(100vh - 140px));
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      border: 1px solid var(--el-border-color-lighter);
      background: #ffffff;
      color: #141414;
      box-shadow: 0 18px 48px rgba(0, 0, 0, .42);
      overflow: hidden;
      user-select: none;
    }
    .page-req-drawer.is-dragging {
      cursor: grabbing;
      box-shadow: 0 22px 56px rgba(0, 0, 0, .48);
    }
    .page-req-drawer__head {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 14px 14px 10px;
      border-bottom: 1px solid rgba(0, 0, 0, .08);
      cursor: grab;
      flex-shrink: 0;
    }
    .page-req-drawer.is-dragging .page-req-drawer__head { cursor: grabbing; }
    .page-req-drawer__head-main { flex: 1; min-width: 0; }
    .page-req-drawer__title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.35;
      color: #0a0d12;
    }
    .page-req-drawer__subtitle {
      margin: 4px 0 0;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(10, 13, 18, .62);
    }
    .page-req-drawer__close {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 8px;
      background: rgba(0, 0, 0, .08);
      color: #0a0d12;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    .page-req-drawer__close:hover { background: rgba(0, 0, 0, .14); }
    .page-req-drawer__body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
      padding: 12px 14px 8px;
    }
    .page-req-drawer__section + .page-req-drawer__section { margin-top: 14px; }
    .page-req-drawer__section-title {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
      color: rgba(10, 13, 18, .72);
      margin-bottom: 6px;
    }
    .page-req-drawer__section-body {
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: #101820;
      margin: 0;
    }
    .page-req-drawer__section-edit {
      width: 100%;
      min-height: 72px;
      resize: vertical;
      border: 1px solid var(--el-border-color-lighter);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      font-size: 13px;
      line-height: 1.6;
      color: #101820;
      background: #f7f7f9;
      box-sizing: border-box;
    }
    .page-req-drawer__section-edit:focus {
      outline: none;
      border-color: rgba(123, 108, 246, .55);
      box-shadow: 0 0 0 2px rgba(123, 108, 246, .18);
    }
    .page-req-drawer__foot {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 10px 14px 14px;
      border-top: 1px solid rgba(0, 0, 0, .08);
      flex-shrink: 0;
    }
    .page-req-drawer__btn {
      min-height: 32px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid var(--el-border-color-lighter);
      background: #f7f7f9;
      color: #141414;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .page-req-drawer__btn:hover { background: #ececf1; }
    .page-req-drawer__btn.is-primary {
      background: #141414;
      border-color: #141414;
      color: #fff;
    }
    .page-req-drawer__btn.is-primary:hover { background: #000; }
    @media (max-width: 900px) {
      .page-req-trigger {
        top: auto;
        bottom: 18px;
        right: 16px;
        font-size: 12px;
        padding: 7px 12px;
      }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script type="text/x-template" id="app-template">
  <!-- 左侧图标栏 -->
  <div class="rail">
    <div class="rail-head">
      <div class="mark"><img src="assets/logo.png" alt="小提大作" /></div>
    </div>
    <div class="rail-main">
      <div v-for="it in nav" :key="it.key" class="nav-item" :class="{on: active===it.key || (it.key==='tools' && (active==='script-breakdown' || active==='script-eval'))}" @click="go(it.key)">
        <span class="ic"><el-icon><component :is="it.icon" /></el-icon></span>
        <span class="tx">{{ it.label }}</span>
        <span v-if="it.badge" class="dot" :class="navBadgeClass(it)">{{ it.badge }}</span>
      </div>
    </div>
    <div class="rail-footer">
      <div class="rail-footer-item" :class="{on: active==='message'}" @click="go('message')">
        <span class="ic"><el-icon><Message /></el-icon></span>
        <span class="tx">消息</span>
      </div>
      <button type="button" class="rail-footer-item" @click="openContactUs">
        <span class="ic"><el-icon><Phone /></el-icon></span>
        <span class="tx">联系</span>
      </button>
      <div class="rail-footer-item" :class="{on: active==='tutorial'}" @click="go('tutorial')">
        <span class="ic"><el-icon><Reading /></el-icon></span>
        <span class="tx">教程</span>
      </div>
      <button type="button" class="rail-footer-item rail-footer-pop" :class="{on: active==='settlement'}" @click="goSettlementPopcorn">
        <span class="ic"><span style="font-size:15px;line-height:1;">🍿</span></span>
        <span class="tx">爆米花</span>
        <span v-if="popcornTodayPending" class="coin-badge">今日待领</span>
      </button>
      <div class="rail-footer-item rail-footer-profile" :class="{on: active==='userspace'}" @click="go('userspace')">
        <el-avatar :size="34" class="rail-footer-avatar" style="background:var(--brand-grad);">
          <img v-if="userProfile.avatar" :src="userProfile.avatar" alt="" style="width:100%;height:100%;object-fit:cover;">
          <span v-else>{{ userProfile.nickname.slice(0,1) }}</span>
        </el-avatar>
      </div>
    </div>
  </div>

  <!-- 主舞台 -->
  <div class="stage">
    <div class="content">
      <!-- ========== 首页（默认，对齐截图） ========== -->
      <div v-if="active==='home'" class="page-shell">
        <div class="hero-wrap">
          <el-carousel type="card" height="230px" :interval="4200">
            <el-carousel-item v-for="(b,i) in banners" :key="i">
              <div class="slide" :style="{background: b.bg}">
                <div>
                  <div class="s-title">{{ b.title }}</div>
                  <div class="s-sub">{{ b.sub }}</div>
                  <el-button :color="b.btn" round>{{ b.cta }}</el-button>
                </div>
              </div>
            </el-carousel-item>
          </el-carousel>
        </div>

        <div class="sec-head">
          <h2>最近项目</h2>
          <span class="home-tab" :class="{on:homeTab==='manhua'}" @click="homeTab='manhua'">漫剧</span>
          <span class="home-tab" :class="{on:homeTab==='writing'}" @click="homeTab='writing'">写作</span>
          <span class="all-link" @click="go('projects')">全部项目 ›</span>
        </div>

        <div class="proj-row" v-if="homeTab==='manhua'">
          <div class="pcard create" @click="go('canvas')">
            <div class="pc-thumb"><el-icon size="26"><Plus /></el-icon><div style="font-size:13px;">开始创作</div><div style="font-size:11px;">无限自由画布</div></div>
          </div>
          <div class="pcard" v-for="p in recentManhua" :key="p.name" @click="go('canvas')">
            <div class="pc-thumb" :style="{background: p.cover || 'var(--el-fill-color-light)'}">
              <span v-if="!p.cover" class="wm">小提大作</span>
            </div>
            <div class="pc-meta"><div class="n">{{ p.name }}</div><div class="d">{{ p.code ? p.code+' · ' : '' }}{{ p.date }}</div></div>
          </div>
        </div>

        <div class="proj-row" v-else>
          <div class="pcard create" @click="go('writing')">
            <div class="pc-thumb"><el-icon size="26"><Plus /></el-icon><div style="font-size:13px;">开始创作</div><div style="font-size:11px;">小说 / 文本</div></div>
          </div>
          <div class="pcard" v-for="p in recentWriting" :key="p.name" @click="go('writing')">
            <div class="pc-thumb" :style="{background: p.cover}"><span class="wm" style="color:rgba(255,255,255,.14)">{{ p.genre }}</span></div>
            <div class="pc-meta"><div class="n">{{ p.name }}</div><div class="d">{{ p.words }} · {{ p.date }}</div></div>
          </div>
        </div>

        <div class="stat-cards" style="margin-top:26px;">
          <div class="stat-card"><div class="l">我的作品</div><div class="v">28</div><div class="t"><el-tag size="small" type="success">本月 +6</el-tag></div></div>
          <div class="stat-card"><div class="l">本月 AI 生成</div><div class="v">1,942</div><div class="t"><span style="color:var(--el-text-color-secondary)">消耗 🍿 620</span></div></div>
          <div class="stat-card"><div class="l">累计收益（元）</div><div class="v">12,480</div><div class="t"><el-tag size="small" type="warning">可提现 8,200</el-tag></div></div>
          <div class="stat-card"><div class="l">邀请分佣（元）</div><div class="v">3,150</div><div class="t"><span style="color:var(--el-text-color-secondary)">下级 42 人</span></div></div>
        </div>
      </div>

      <!-- ========== 项目（复刻小题大作创作页） ========== -->
      <div v-if="active==='projects'" class="page-shell proj-page">
        <!-- 3D Banner 轮播 -->
        <div class="proj-banner">
          <el-carousel type="card" height="280px" :interval="5000" indicator-position="outside" arrow="always">
            <el-carousel-item v-for="(b,i) in projBanners" :key="i">
              <div class="banner-slide" :style="{backgroundImage: 'url('+b.img+')'}">
                <div class="bs-body">
                  <div class="bs-brand">{{ b.brand }}</div>
                  <div class="bs-sub">{{ b.sub }}</div>
                  <div class="bs-cta" @click.stop="b.action && go(b.action)">{{ b.cta }}</div>
                </div>
              </div>
            </el-carousel-item>
          </el-carousel>
        </div>

        <!-- 最近项目 -->
        <div class="proj-sec">
          <div class="proj-sec-head">
            <h2>最近项目</h2>
            <div class="proj-pills">
              <button class="pill" :class="{on: projTab==='film'}" @click="projTab='film'">自由画布</button>
              <button class="pill" :class="{on: projTab==='sop'}" @click="projTab='sop'">SOP画布</button>
              <button class="pill" :class="{on: projTab==='writing'}" @click="projTab='writing'">写作</button>
              <button class="pill" :class="{on: projTab==='script'}" @click="projTab='script'">剧本</button>
            </div>
          </div>

          <!-- 最近项目 · 宫格（影片 / SOP画布 / 写作 / 剧本统一） -->
          <div class="canvas-grid">
            <div class="canvas-card create" @click="openCreateMode">
              <div class="cg-inner">
                <span class="cg-plus">+</span>
                <span class="cg-label">{{ projCreateConfig.label }}</span>
                <span class="cg-mode">{{ projCreateConfig.mode }}</span>
              </div>
            </div>
            <div class="canvas-card" v-for="p in currentGridProjects" :key="p.id" @click="openGridProject(p)">
              <div class="cg-cover" :style="p.cover ? {backgroundImage: 'url('+p.cover+')'} : {}">
                <span v-if="!p.cover" class="wm">{{ p.genre || '小题大作' }}</span>
                <div class="cg-overlay">
                  <div class="cg-name">{{ p.name }}</div>
                  <div class="cg-date">{{ p.date }}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ========== 写作 ========== -->
      <div v-if="active==='writing'" class="page-shell page-shell--wide">
        <div class="page-title"><div><h2>{{ writingEntryFrom==='script' ? '剧本 · 文本创作' : '写作 · 小说/文本创作' }}</h2>
          <div class="desc" v-if="writingPlaceholder && writingEntryFrom==='script'">参考小题写作的模式，详情页内调整功能名称</div>
          <div class="desc" v-else-if="writingPlaceholder">使用小题大作现有的写作流程</div>
          <div class="desc" v-else>作品 → 整体架构 → 细纲 → 章节正文 → 导出全文（计费：🌽 米花）</div></div>
          <div v-if="!writingPlaceholder"><el-button @click="go('copyright')"><el-icon><Notebook /></el-icon>一键确权挂牌</el-button><el-button type="primary">导出全文</el-button></div></div>
        <div v-if="writingPlaceholder && writingEntryFrom==='script'" class="writing-placeholder writing-placeholder--script">
          <div class="writing-placeholder__section">
            <div class="writing-placeholder__section-title">A · 参考小题写作的模式，详情页内调整功能名称</div>
            <ol class="writing-placeholder__list">
              <li>左侧菜单：剧本概况、各章节名称（字数、最后修改时间）</li>
              <li>中间区域：剧本概况对应中间区域页面跟小说差不多；封面图（可修改）；标题（可修改）、特殊设定（默认为空，可不填，但如果用户填写，要将此内容在每次生成剧集内容时加到上下文中，如特殊的计量单位设定，人物等级设定等）</li>
              <li>故事大纲：（可直接修改，也可通过修改提示词重新生成，大纲修改完后，提示用户是否重新生成人物小传和集纲，如果用户选择是，要参考新大纲生成）</li>
              <li>人物小传：可延续角色库方式</li>
              <li>集纲（如果用户选择生成则有，否则没有此模块，用户可以针对每一个集纲单独进行修改）</li>
              <li>各章节名称对应中间区域页面</li>
              <li>章节名称</li>
              <li>章节内容 · <a href="https://mqv7erfldf.feishu.cn/wiki/JOQ8wfEAdiJkTIkmxSucgcxKnX1" target="_blank" rel="noopener noreferrer">飞书文档参考</a></li>
            </ol>
          </div>
          <div class="writing-placeholder__section">
            <div class="writing-placeholder__section-title">B · 功能按钮</div>
            <div class="writing-placeholder__actions">
              <el-button @click="go('script-eval')">剧本评估</el-button>
              <el-button @click="go('script-breakdown')">剧本拆解</el-button>
              <el-button type="primary" @click="openContactBusiness">申请投稿</el-button>
            </div>
            <p class="writing-placeholder__hint">申请投稿将联系商务顾问</p>
          </div>
        </div>
        <div v-else-if="writingPlaceholder" class="writing-placeholder">
          <div class="writing-placeholder__main">使用小题大作现有的写作流程</div>
          <div class="writing-placeholder__opts">
            <div class="writing-placeholder__item">
              <span class="writing-placeholder__tag">A</span>
              <div><strong>写作优化</strong><p>提示词以及长文记忆优化（直接影响写作结果，需要重视，提示词调优）</p></div>
            </div>
            <div class="writing-placeholder__item">
              <span class="writing-placeholder__tag">B</span>
              <div><strong>写作流程优化</strong><p>市场反馈偏固化，需要再次讨论流程节点优化</p></div>
            </div>
            <div class="writing-placeholder__item">
              <span class="writing-placeholder__tag">C</span>
              <div><strong>确权挂牌</strong><p>完成写作后可申请版权挂牌授权</p><el-button type="primary" plain size="small" style="margin-top:8px;" @click="openContactBusiness">申请挂牌授权</el-button></div>
            </div>
          </div>
        </div>
        <div v-else class="writer">
          <div class="col chapters">
            <div style="padding:10px 14px;font-size:12px;color:var(--el-text-color-secondary)">章节目录 · 《凡人修仙诀》</div>
            <div v-for="(c,i) in chapters" :key="i" class="ch" :class="{active:i===1}">{{ c }}</div>
            <div style="padding:10px 14px;"><el-button size="small" text type="primary"><el-icon><Plus /></el-icon>新增章节</el-button></div>

      go(key, opts) {

          clearTimeout(this.scriptEvalTimer);
          this.scriptEvalTimer = null;
          this.scriptEvalRunning = false;

          this.writingPlaceholder = !!(opts && opts.placeholder);

          this.writingPlaceholder = false;
          this.writingEntryFrom = null;

      getPageReqDefaults(pageKey) {
        const spec = window.PAGE_REQ_SPECS && window.PAGE_REQ_SPECS[pageKey];
        if (!spec) {
          return {
            title: this.currentPageReqLabel,
            mainFunctions: '',
            functionPoints: '',
            fields: '',
            rules: '',
            interactions: '',
          };
        }
        return {
          title: spec.title || this.currentPageReqLabel,
          mainFunctions: spec.mainFunctions || '',
          functionPoints: spec.functionPoints || '',
          fields: spec.fields || '',
          rules: spec.rules || '',
          interactions: spec.interactions || '',
        };

      loadPageReqSpec() {
        const defaults = this.getPageReqDefaults(this.active);
        this.pageReqContent = { ...defaults };

        this.pageReqEditing = false;

        this.loadPageReqSpec();

        this.pageReqVisible = false;

        this.pageReqDraft = JSON.parse(JSON.stringify(this.pageReqContent));

      cancelPageReqEdit() {
        this.pageReqEditing = false;
        this.pageReqDraft = null;
      },
      async savePageReqSpec() {
        if (!this.pageReqDraft) return;
        const pageKey = this.active;
        this.pageReqContent = { ...this.pageReqDraft };
        if (window.PAGE_REQ_SPECS) {
          window.PAGE_REQ_SPECS[pageKey] = { ...this.pageReqContent };
        }
        try {
          const res = await fetch('/api/page-req-specs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pageKey, spec: this.pageReqContent }),
          });
          const data = await res.json().catch(() => ({}));
          if (res.ok && data.ok) {
            ElementPlus.ElMessage.success('页面需求说明已保存到 page-req-specs.js，刷新后仍生效');
          } else {
            throw new Error(data.error || '保存失败');
          }
        } catch (e) {
          const prefix = window.PAGE_REQ_STORAGE_PREFIX || 'aixt-demo-page-req:';
          try {
            localStorage.setItem(prefix + pageKey, JSON.stringify(this.pageReqContent));
            ElementPlus.ElMessage.warning('已暂存到浏览器（请用 serve-dev.sh 启动 Demo 以同步到 git 文件）');
          } catch (err) {
            ElementPlus.ElMessage.error('保存失败，请检查浏览器存储或服务是否启动');
          }
        }
        this.pageReqEditing = false;
        this.pageReqDraft = null;
      },
      resetPageReqDrag() {
        this.pageReqDragPos = null;
        this.pageReqDragHeight = null;
        this.pageReqDragging = false;
      },
      bindPageReqDragListeners() {
        this._pageReqOnMove = (e) => this.onPageReqDragMove(e);
        this._pageReqOnEnd = () => this.onPageReqDragEnd();
      },
      unbindPageReqDragListeners() {
        document.removeEventListener('mousemove', this._pageReqOnMove);
        document.removeEventListener('mouseup', this._pageReqOnEnd);
      },
      onPageReqDragStart(e) {
        if (e.button !== 0 || this.pageReqEditing) return;
        if (e.target && e.target.closest('.page-req-drawer__close')) return;
        const el = this.$refs.pageReqDrawer;
        if (!el) return;
        const rect = el.getBoundingClientRect();
        this.pageReqDragHeight = rect.height;
        this.pageReqDragPos = { left: rect.left, top: rect.top };
        this.pageReqDragOffset = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        this.pageReqDragging = true;
        document.addEventListener('mousemove', this._pageReqOnMove);
        document.addEventListener('mouseup', this._pageReqOnEnd);
        e.preventDefault();
      },
      onPageReqDragMove(e) {
        if (!this.pageReqDragging || !this.pageReqDragPos) return;
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const el = this.$refs.pageReqDrawer;
        const w = el ? el.offsetWidth : 540;
        const h = this.pageReqDragHeight || (el ? el.offsetHeight : 640);
        let left = e.clientX - this.pageReqDragOffset.x;
        let top = e.clientY - this.pageReqDragOffset.y;
        left = Math.max(4, Math.min(left, vw - w - 4));
        top = Math.max(4, Math.min(top, vh - h - 4));
        this.pageReqDragPos = { left, top };
      },
      onPageReqDragEnd() {
        this.pageReqDragging = false;
        document.removeEventListener('mousemove', this._pageReqOnMove);
        document.removeEventListener('mouseup', this._pageReqOnEnd);
      },
      onPageReqWheel(e) {
        const body = e.currentTarget && e.currentTarget.querySelector('.page-req-drawer__body');
        if (!body) return;
        const atTop = body.scrollTop <= 0;
        const atBottom = body.scrollTop + body.clientHeight >= body.scrollHeight - 1;
        if ((atTop && e.deltaY < 0) || (atBottom && e.deltaY > 0)) e.preventDefault();

        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + w, y, x + w, y + h, radius);
        ctx.arcTo(x + w, y + h, x, y + h, radius);
        ctx.arcTo(x, y + h, x, y, radius);
        ctx.arcTo(x, y, x + w, y, radius);

          family: ['#1f2430', '#5c4a3a'],
          business: ['#121820', '#2f4858'],
          youth: ['#1a2840', '#3d6ea8'],
          comedy: ['#2a2418', '#8a6a2a'],
          nostalgia: ['#241c14', '#6b5344'],
          action: ['#1a1010', '#7a2828'],
          scifi: ['#0f1428', '#2a4a8a'],
          disaster: ['#181410', '#5a4030'],
          myth: ['#14101a', '#5a3a7a'],
          blackmyth: ['#0a0a0a', '#2a2010'],
          xianxia: ['#101820', '#3a5a6a'],
          xuanhuan: ['#141018', '#4a3060'],
          chinese: ['#1a1410', '#6a4030'],
          wuxia: ['#101010', '#4a4030'],
          palace: ['#1a1018', '#5a2848'],
        };
        const key = (item && item.key) || 'default';
        let c1 = '#1a1a1e';
        let c2 = '#3a3a48';
        if (genreColors[key]) {
          [c1, c2] = genreColors[key];
        } else {
          const idx = [...String((item && item.id) || '')].reduce((sum, ch) => sum + ch.charCodeAt(0), 0) % this.covers.length;
          const gradient = this.covers[idx] || this.covers[0];
          const match = gradient.match(/#[0-9a-fA-F]{3,8}/g);
          if (match && match.length >= 2) [c1, c2] = match;
        }
        const title = String((item && item.title) || '封面').replace(/[<>&'"]/g, '');
        const sub = String((item && item.cat) || '').replace(/[<>&'"]/g, '');
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs><rect width="640" height="360" fill="url(#g)"/><rect width="640" height="360" fill="rgba(0,0,0,.18)"/><text x="28" y="292" fill="rgba(255,255,255,.94)" font-size="34" font-weight="800" font-family="system-ui,sans-serif">${title}</text>${sub ? `<text x="28" y="322" fill="rgba(255,255,255,.58)" font-size="14" font-family="system-ui,sans-serif">${sub}</text>` : ''}</svg>`;
        return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
      },
      openProfileAvatarDialog() {
        this.profileEditForm.avatar = this.userProfile.avatar || this.profileAvatarPresets[0].url;
        this.profileAvatarDialog = true;
      },
      saveProfileAvatar() {
        if (!this.profileEditForm.avatar) {
          ElementPlus.ElMessage.warning('请选择头像');
          return;
        }
        this.userProfile.avatar = this.profileEditForm.avatar;
        this.profileAvatarDialog = false;
        ElementPlus.ElMessage.success('头像已更新');
      },
      openProfileEdit(type) {
        if (type === 'nickname') {
          this.profileEditForm.nickname = this.userProfile.nickname;
          this.profileNicknameDialog = true;
          return;
        }
        if (type === 'phone') {
          this.profileEditForm.phone = this.userProfile.phone;
          this.profileEditForm.smsCode = '';
          this.profilePhoneDialog = true;
          return;
        }
        if (type === 'password') {
          this.profileEditForm.oldPassword = '';
          this.profileEditForm.newPassword = '';
          this.profileEditForm.confirmPassword = '';
          this.profilePasswordDialog = true;
        }
      },
      saveProfileNickname() {
        const name = this.profileEditForm.nickname.trim();
        if (!name) {
          ElementPlus.ElMessage.warning('昵称不能为空');
          return;
        }
        if (name.length > 20) {
          ElementPlus.ElMessage.warning('昵称最多 20 个字符');
          return;
        }
        this.userProfile.nickname = name;
        this.profileNicknameDialog = false;
        ElementPlus.ElMessage.success('昵称已更新');
      },
      saveProfilePhone() {
        const phone = String(this.profileEditForm.phone || '').trim();
        if (!/^1\d{10}$/.test(phone)) {
          ElementPlus.ElMessage.warning('请输入正确的11位手机号');
          return;
        }
        if (!this.profileEditForm.smsCode.trim()) {
          ElementPlus.ElMessage.warning('请输入短信验证码');
          return;
        }
        this.userProfile.phone = phone;
        this.profilePhoneDialog = false;
        ElementPlus.ElMessage.success('手机号已更新');
      },
      saveProfilePassword() {
        const { oldPassword, newPassword, confirmPassword } = this.profileEditForm;
        if (!oldPassword || !newPassword || !confirmPassword) {
          ElementPlus.ElMessage.warning('请填写完整密码信息');
          return;
        }
        if (newPassword.length < 8 || newPassword.length > 20) {
          ElementPlus.ElMessage.warning('新密码需为 8-20 位');
          return;
        }
        if (newPassword !== confirmPassword) {
          ElementPlus.ElMessage.warning('两次输入的新密码不一致');
          return;
        }
        this.profilePasswordDialog = false;
        ElementPlus.ElMessage.success('登录密码已更新');
      },
      copyInviteCode(code) {
        const text = String(code || '');
        if (!text) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => {
            ElementPlus.ElMessage.success('已复制邀请码 ' + text);
          }).catch(() => this.interact('复制 ' + text));
          return;
        }
        this.interact('复制 ' + text);
      },
      interact(act) { ElementPlus.ElMessage.info(act === '分享' ? '已分享' : (act + ' 需登录 · 弹出登录浮层（登录后自动补执行）')); },
      submitPlayLink() { ElementPlus.ElMessage.success('公开链接已提交，审核后按 500/1万/5万/10万 阶梯发放积分'); },
      submitWithdraw() { this.withdrawDialog = false; ElementPlus.ElMessage.success('提现申请已提交，待审核'); },
      submitExchange() {
        const amt = Number(this.exchangeAmount) || 0;
        if (amt < this.exchangeRate) { ElementPlus.ElMessage.warning('最低兑换 ' + this.exchangeRate + ' 爆米花'); return; }
        if (amt > this.exchangeablePopcorn) { ElementPlus.ElMessage.warning('超出可兑换额度'); return; }
        const yuan = Math.floor(amt / this.exchangeRate * 100) / 100;
        this.popcornEarned -= amt;
        this.withdrawableBalance += yuan;
        this.popcornTransactions.unshift({ type:'兑换为元', category:'exchange', time: new Date().toLocaleString('zh-CN', {hour12:false}).replace(/\//g,'-'), amount: -amt });
        this.exchangeDialog = false;
        this.exchangeAmount = '';
        ElementPlus.ElMessage.success('已兑换 ¥' + yuan.toFixed(2) + '，已转入可提现余额');
      },
      submitInvoice() { this.invoiceDialog = false; ElementPlus.ElMessage.success('开票申请已提交'); },
      formatToolUsers(n) {
        const num = Number(n || 0);
        if (num >= 10000) return (num / 10000).toFixed(1).replace(/\.0$/, '') + '万';
        return num.toLocaleString('zh-CN');
      },
      openTool(tool) {
        if (tool.id === 'script-eval') {
          this.initScriptEvalPrompts();
          this.loadScriptEvalDemo();
          this.scriptEvalRunning = false;
          this.scriptEvalReviewSubmitted = false;
          if (this.scriptEvalTimer) clearTimeout(this.scriptEvalTimer);
          this.go('script-eval');
          return;
        }
        if (tool.page || tool.id === 'script-breakdown') {
          this.initScriptBreakdown();
          this.go('script-breakdown');
          return;
        }
        this.activeTool = tool;
        this.toolLink = '';
        this.toolRunning = false;
        this.toolResult = null;
        this.toolReviewSubmitted = false;
        if (this.toolTimer) clearTimeout(this.toolTimer);
        this.toolDialog = true;
      },
      initScriptEvalPrompts() {
        const defaults = window.WORKBENCH_TOOLS && window.WORKBENCH_TOOLS.defaultScriptEvalPrompts;
        if (!defaults) return;
        this.scriptEvalPromptPreset = 'standard';
        this.scriptEvalPrompts = JSON.parse(JSON.stringify(defaults));
        this.scriptEvalCustomPrompt = '';
        this.scriptEvalCustomPromptDraft = '';
        this.scriptEvalResultTab = 'overview';
      },
      loadScriptEvalDemo() {
        const fn = window.WORKBENCH_TOOLS && window.WORKBENCH_TOOLS.buildScriptEvalDemo;
        this.scriptEvalResult = fn ? fn() : null;
        this.scriptEvalResultTab = 'overview';
      },
      onScriptEvalPromptChange(val) {
        if (val === 'custom') this.openScriptEvalCustomDialog();
      },
      openScriptEvalCustomDialog() {
        this.scriptEvalCustomPromptDraft = this.scriptEvalCustomPrompt || (this.scriptEvalPrompts.custom && this.scriptEvalPrompts.custom.text) || '';
        this.scriptEvalCustomDialog = true;
      },
      saveScriptEvalCustom() {
        const text = String(this.scriptEvalCustomPromptDraft || '').trim();
        if (!text) {
          ElementPlus.ElMessage.warning('请输入自定义提示词');
          return;
        }
        this.scriptEvalCustomPrompt = text;
        if (this.scriptEvalPrompts.custom) this.scriptEvalPrompts.custom.text = text;
        this.scriptEvalPromptPreset = 'custom';
        this.scriptEvalCustomDialog = false;
        ElementPlus.ElMessage.success('自定义提示词已保存');
      },
      cancelScriptEvalCustom() {
        this.scriptEvalCustomDialog = false;
        if (!this.scriptEvalCustomPrompt) this.scriptEvalPromptPreset = 'standard';
      },
      scriptEvalScorePct(d) {
        if (!d || !d.max) return 0;
        return Math.max(0, Math.min(100, Math.round((d.score / d.max) * 100)));
      },
      scriptEvalLevelIcon(level) {
        return { green: '🟢', yellow: '🟡', red: '🔴' }[level] || '';
      },
      scriptEvalRadarRing(ratio) {
        const dims = (this.scriptEvalResult && this.scriptEvalResult.marketPosition && this.scriptEvalResult.marketPosition.dimensions) || [];
        const cx = 100; const cy = 100; const r = 70 * ratio;
        return dims.map((d, i) => {
          const angle = (Math.PI * 2 * i) / Math.max(dims.length, 1) - Math.PI / 2;
          return (cx + Math.cos(angle) * r) + ',' + (cy + Math.sin(angle) * r);
        }).join(' ');
      },
      scriptEvalRadarAxis(i) {
        const dims = (this.scriptEvalResult && this.scriptEvalResult.marketPosition && this.scriptEvalResult.marketPosition.dimensions) || [];
        const cx = 100; const cy = 100; const r = 70;
        const angle = (Math.PI * 2 * i) / Math.max(dims.length, 1) - Math.PI / 2;
        return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
      },
      scriptEvalRadarLabel(i) {
        const dims = (this.scriptEvalResult && this.scriptEvalResult.marketPosition && this.scriptEvalResult.marketPosition.dimensions) || [];
        const cx = 100; const cy = 100; const r = 86;
        const angle = (Math.PI * 2 * i) / Math.max(dims.length, 1) - Math.PI / 2;
        return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
      },
      initScriptBreakdown() {
        const demo = window.WORKBENCH_TOOLS && window.WORKBENCH_TOOLS.scriptBreakdownDemo;
        if (demo) this.sbProject = JSON.parse(JSON.stringify(demo));
        this.sbEpisodeId = (this.sbProject.episodes && this.sbProject.episodes[0] && this.sbProject.episodes[0].id) || 'ep01';
        this.sbModel = this.sbProject.model || 'Vision 3.5 Flash';
        this.sbScriptFormat = 'standard';
        this.stopSbPlay();
      },
      selectSbEpisode(id) {
        this.sbEpisodeId = id;
        this.stopSbPlay();
      },
      toggleSbPlay() {
        if (this.sbPlaying) {
          this.stopSbPlay();
          return;
        }
        this.sbPlaying = true;
        let sec = 0;
        const ep = this.sbCurrentEpisode;
        const total = ep ? this.parseSbDuration(ep.duration) : 600;
        if (this.sbPlayTimer) clearInterval(this.sbPlayTimer);
        this.sbPlayTimer = setInterval(() => {
          sec += 1;
          if (sec >= total) {
            this.stopSbPlay();
            return;
          }
          this.sbVideoTime = this.formatSbTime(sec);
          this.sbProgress = Math.min(100, Math.round((sec / total) * 100));
        }, 1000);
      },
      stopSbPlay() {
        this.sbPlaying = false;
        this.sbVideoTime = '0:00';
        this.sbProgress = 0;
        if (this.sbPlayTimer) {
          clearInterval(this.sbPlayTimer);
          this.sbPlayTimer = null;
        }
      },
      parseSbDuration(str) {
        const parts = String(str || '0:00').split(':').map(Number);
        if (parts.length === 2) return parts[0] * 60 + parts[1];
        if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
        return 600;
      },
      formatSbTime(sec) {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return m + ':' + String(s).padStart(2, '0');
      },
      reanalyzeSbEpisode(ep) {
        ElementPlus.ElMessage.success('正在重新分析 · ' + (ep.fileName || ep.index));
      },
      removeSbEpisode(ep) {
        ElementPlus.ElMessageBox.confirm('确定删除该集拆解结果？', '删除分集', {
          confirmButtonText: '删除',
          cancelButtonText: '取消',
          type: 'warning',
        }).then(() => {
          const list = this.sbProject.episodes || [];
          const idx = list.findIndex(item => item.id === ep.id);
          if (idx === -1) return;
          list.splice(idx, 1);
          if (this.sbEpisodeId === ep.id) {
            this.sbEpisodeId = (list[0] && list[0].id) || '';
          }
          ElementPlus.ElMessage.success('已删除');
        }).catch(() => {});
      },
      copySbScript() {
        const ep = this.sbCurrentEpisode;
        if (!ep) return;
        const lines = [];
        (ep.scenes || []).forEach(scene => {
          const setting = this.sbScriptFormat === 'intl' ? scene.settingIntl : scene.setting;
          lines.push('场景 ' + scene.number + ' · ' + setting);
          lines.push('人物：' + scene.characters);
          lines.push('道具：' + scene.props);
          (scene.lines || []).forEach(line => {
            if (line.type === 'dialogue') lines.push(line.speaker + '：[' + line.time + '] ' + line.text);
            else lines.push('[' + line.time + '] ' + line.text);
          });
          lines.push('');
        });
        this.copyToolText(lines.join('\n'), '脚本');
      },
      resetToolDialog() {
        if (this.toolTimer) clearTimeout(this.toolTimer);
        this.toolTimer = null;
        this.activeTool = null;
        this.toolLink = '';
        this.toolRunning = false;
        this.toolResult = null;
        this.toolReviewSubmitted = false;
      },
      runScriptEval() {
        if (this.scriptEvalRunning) return;
        if (!String(this.scriptEvalScript || '').trim()) {
          ElementPlus.ElMessage.warning('请先粘贴剧本内容');
          return;
        }
        this.scriptEvalRunning = true;
        this.scriptEvalResult = null;
        this.scriptEvalReviewSubmitted = false;
        this.scriptEvalResultTab = 'overview';
        if (this.scriptEvalPromptPreset === 'custom' && !String(this.scriptEvalCustomPrompt || '').trim()) {
          this.scriptEvalRunning = false;
          ElementPlus.ElMessage.warning('请先设置自定义评估提示词');
          this.openScriptEvalCustomDialog();
          return;
        }
        if (this.scriptEvalTimer) clearTimeout(this.scriptEvalTimer);
        this.scriptEvalTimer = setTimeout(() => {
          const build = window.WORKBENCH_TOOLS && window.WORKBENCH_TOOLS.buildScriptEvalResult;
          this.scriptEvalResult = build ? build(this.scriptEvalModel, this.scriptEvalQuality, this.scriptEvalScript) : null;
          this.scriptEvalRunning = false;
          ElementPlus.ElMessage.success('评估报告已生成');
        }, 1200);
      },
      submitScriptEvalReview() {
        this.scriptEvalReviewSubmitted = true;
        ElementPlus.ElMessage.success('已提交审核');
      },
      generateToolResult() {
        if (!this.activeTool || this.toolRunning) return;
        this.toolRunning = true;
        this.toolResult = null;
        this.toolReviewSubmitted = false;
        if (this.toolTimer) clearTimeout(this.toolTimer);
        this.toolTimer = setTimeout(() => {
          const build = window.WORKBENCH_TOOLS && window.WORKBENCH_TOOLS.buildResult;
          this.toolResult = build ? build(this.activeTool, this.toolLink) : null;
          this.toolRunning = false;
          ElementPlus.ElMessage.success('结果已生成');
        }, 900);
      },
      copyToolText(text, label) {
        const value = String(text || '');
        if (!value) return;
        navigator.clipboard.writeText(value).then(() => {
          ElementPlus.ElMessage.success((label || '内容') + '已复制');
        }).catch(() => {
          ElementPlus.ElMessage.info('复制失败，请手动选择文本');
        });
      },
      copyToolBlock(index) {
        const block = this.toolResult && this.toolResult.blocks && this.toolResult.blocks[index];
        if (!block) return;
        this.copyToolText(block.copy, block.title);
      },
      copyToolAll() {
        this.copyToolText(this.toolCombinedText, '完整提示词');
      },
      copyVideoOutline() {
        const fn = window.WORKBENCH_TOOLS && window.WORKBENCH_TOOLS.outlineCopyText;
        const text = fn ? fn(this.toolResult) : '';
        this.copyToolText(text, '细纲');
      },
      copyScriptEvalReport() {
        const fn = window.WORKBENCH_TOOLS && window.WORKBENCH_TOOLS.scriptEvalReportText;
        const text = fn ? fn(this.scriptEvalResult) : '';
        this.copyToolText(text, '完整报告');
      },
      copyScriptEvalSection(section) {
        this.copyScriptEvalReport();
      },
      submitToolReview() {
        this.toolReviewSubmitted = true;
        ElementPlus.ElMessage.success('已提交审核');
      },
    },
  });
  app.use(ElementPlus);
  for (const [key, comp] of Object.entries(ElementPlusIconsVue)) { app.component(key, comp); }
  app.mount('#app');
  window.addEventListener('load', () => {
    const stage = document.querySelector('.stage');
    if (stage) stage.dispatchEvent(new Event('scroll'));
  });
</script>
</body>
</html>
